<!doctype html>
<html>
  <head><title>Create your account</title></head>
  <body style="font-family: sans-serif; padding: 40px;">
    <h1>Create your account</h1>
    <form method="get" action="signup.html">
      <p><label>Email <input type="email" id="su-email" autocomplete="email" style="width:240px" /></label></p>
      <p><label>Password <input type="password" id="su-password" autocomplete="new-password" style="width:240px" /></label></p>
      <p><label>Confirm <input type="password" id="su-confirm" autocomplete="new-password" style="width:240px" /></label></p>
      <p><button type="submit">Create account</button></p>
    </form>
  </body>
</html>
